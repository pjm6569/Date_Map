name: date_map
description: 식당 중심의 맞춤형 데이트 코스 추천 앱 (MVP)
publish_to: "none"
version: 0.2.6+6

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2                 # LLM REST 호출 (OpenAI / Gemini / Custom)
  url_launcher: ^6.3.0         # 네이버 지도 아웃링크
  flutter_naver_map: ^1.3.0    # 네이버 네이티브 지도 위젯
  shared_preferences: ^2.3.2   # AI 공급자/키 설정 저장
  webview_flutter: ^4.10.0     # 앱 내 네이버 장소 상세(별점/메뉴/리뷰) 표시
  package_info_plus: ^8.1.1    # 현재 앱 버전 확인 (자동 업데이트)
  path_provider: ^2.1.5        # APK 다운로드 저장 경로
  open_filex: ^4.5.0           # 다운로드한 APK 설치 인텐트
  permission_handler: ^11.3.1  # 설치 권한 요청

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1   # 앱 런처 아이콘 자동 생성

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  # Android 8.0+ 적응형 아이콘 (배경색 + 전경 이미지)
  adaptive_icon_background: "#F7C9B8"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 23
